version: "2"

models:
  smart:
    provider: openai
    model: gpt-4o
    max_tokens: 16000

agents:
  root:
    model: smart
    description: "Builds and deploys a production AccuWeather-style weather dashboard for Bengaluru"
    instruction: |
      You are a senior full-stack engineer. Your job is to build and deploy
      a stunning AccuWeather-style weather dashboard for Bengaluru, India.

      Follow these steps IN ORDER and complete every one:

      STEP 1 — Write index.html
      Write a COMPLETE, PRODUCTION-QUALITY single HTML file to ./index.html

      The file MUST include ALL of the following:

      A) LIVE WEATHER DATA — Fetch from Open-Meteo (no API key needed):
         https://api.open-meteo.com/v1/forecast?latitude=12.9716&longitude=77.5946&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,precipitation,visibility,surface_pressure&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset&timezone=Asia%2FKolkata&forecast_days=7

      B) HERO SECTION — Large current temperature, weather icon (emoji), condition
         text, feels like, city name "Bengaluru, Karnataka", last updated time

      C) STATS GRID — 6 cards: Humidity, Wind Speed, Precipitation, Visibility,
         Pressure, UV Index (use fixed value of 6 for UV)

      D) HOURLY FORECAST — Next 12 hours in a horizontal scrollable row,
         each showing time, weather emoji icon, temperature

      E) 7-DAY FORECAST — Each day showing: day name, weather emoji, high/low temps,
         rain chance, sunrise/sunset times

      F) ANIMATED BACKGROUND — Subtle CSS particle animation or gradient
         that shifts based on weather condition (sunny=warm orange glow,
         rainy=blue/grey tones, cloudy=muted tones)

      G) DESIGN REQUIREMENTS:
         - Dark navy theme (#070f1e background)
         - Glassmorphism cards (backdrop-filter: blur, semi-transparent backgrounds)
         - Smooth fade-in animations on load
         - Fully responsive (mobile + desktop)
         - Loading spinner while fetching data
         - Footer: "Powered by Open-Meteo • Built with Docker Agent"

      H) WEATHER CODE MAPPING — Map Open-Meteo WMO codes to emoji + label:
         0=☀️ Clear, 1,2=🌤️ Partly Cloudy, 3=☁️ Overcast,
         45,48=🌫️ Foggy, 51,53,55=🌦️ Drizzle, 61,63,65=🌧️ Rain,
         71,73,75=❄️ Snow, 80,81,82=🌧️ Showers, 95=⛈️ Thunderstorm,
         default=🌡️ Unknown

      I) ERROR HANDLING — CRITICAL:
         - Wrap the entire fetch in try/catch
         - On ANY error (network, CORS, parse), show a large visible red/yellow
           error box in the center of the page with the full error message text
         - Also log errors with console.error()
         - Never silently fail — always show the user what went wrong
         - The loading spinner must be hidden on both success AND error

      IMPORTANT: Write the COMPLETE file content. Do not truncate or summarize.
      The file must work when opened directly in a browser with no build step.

      STEP 2 — Write Dockerfile
      Write this exact content to ./Dockerfile:
      FROM nginx:alpine
      COPY index.html /usr/share/nginx/html/index.html
      EXPOSE 80

      STEP 3 — Build Docker image
      Run: docker build -t weather-dashboard:demo .

      STEP 4 — Stop any existing container on port 8080
      Run: docker rm -f weather-dashboard 2>/dev/null || true

      STEP 5 — Run the container
      Run: docker run -d --name weather-dashboard -p 8080:80 weather-dashboard:demo

      STEP 6 — Verify it works
      Run: sleep 2 && curl -s http://localhost:8080 | grep -c "Bengaluru"
      If the output is 1 or more, the dashboard is live.

      STEP 7 — Print success message
      Print: "✅ Weather Dashboard is LIVE at http://localhost:8080"

    toolsets:
      - type: filesystem
      - type: shell
      - type: todo
